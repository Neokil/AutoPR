states:
  - name: fetch-ticket-data
    prompt: prompts/fetch-ticket.md
    pre_prompt_commands: []
    post_prompt_commands: []
    actions:
      - label: "Continue"
        type: move_to_state
        target: investigation
      - label: "Cancel"
        type: move_to_state
        target: cancelled

  - name: investigation
    prompt: prompts/investigate.md
    pre_prompt_commands: []
    post_prompt_commands: []
    actions:
      - label: "Provide Feedback"
        type: provide_feedback
      - label: "Approve"
        type: move_to_state
        target: implementation
      - label: "Decline"
        type: move_to_state
        target: cancelled

  - name: implementation
    prompt: prompts/implement.md
    pre_prompt_commands: []
    post_prompt_commands: []
    actions:
      - label: "Provide Feedback"
        type: provide_feedback
      - label: "Fetch PR Feedback"
        type: run_script
        commands:
          - gh pr view --json reviews --jq '[.reviews[].body] | join("\n\n")'
        always:
          type: provide_feedback
      - label: "Accept"
        type: move_to_state
        target: done
      - label: "Cancel"
        type: move_to_state
        target: cancelled
