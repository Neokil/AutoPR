provider: codex

guidelines_file: CODING_GUIDELINES.md
state_dir_name: .auto-pr
repository_directories: []
server_port: 8080
server_workers: 4
create_pr: true
max_fix_attempts: 1
base_branch: ""

check_commands: []
format_commands: []
lint_commands: []

providers:
  gemini:
    command: gemini
    args: []
  codex:
    command: codex
    args:
      - exec
      - "-"
