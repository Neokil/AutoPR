name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  lint-be:
    name: Lint (Go)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - uses: golangci/golangci-lint-action@v9

  lint-fe:
    name: Lint (Frontend)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --prefix web

      - name: Type check
        run: npm run typecheck --prefix web

      - name: ESLint
        run: npm run lint --prefix web

  test-be:
    name: Tests (Go)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Run unit tests
        run: go test ./...

  test-fe:
    name: Tests (Frontend)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci --prefix web

      - name: Run unit tests
        run: npm test --prefix web

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ lint-be, lint-fe, test-be, test-fe ]
    steps:
      - uses: actions/checkout@v6

      - name: Run E2E tests
        run: make test-e2e
